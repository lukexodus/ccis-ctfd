<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Background</title>
  <style>
    @font-face {
      font-family: "Matrix Code NFI";
      font-style: normal;
      font-weight: normal;
      src: local("Matrix Code NFI"), url("font/matrix_code_nfi.woff") format("woff");
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #matrix {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>

  <script>
    (function () {
      const canvas = document.getElementById("matrix");
      const ctx = canvas.getContext("2d");

      // Fixed user-selected options
      const density = 1.2;
      const color = "#00FF00"; // lime
      const zoomFactor = 0.7;
      const baseFontSize = 30;
      const fontSize = Math.floor(baseFontSize * zoomFactor);
      const speedIntervalMs = 80; // slow (equivalent to original speed factor 0.5)

      let columns = 0;
      let drops = [];
      let lastTick = 0;
      const chars = "!\"#$%&'()*+,-./:;<=>?[\\]^_{|}~ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

      function reset() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        columns = Math.max(1, Math.floor((density * canvas.width) / fontSize));
        drops = new Array(columns).fill(0).map(function () {
          return Math.floor(Math.random() * canvas.height / fontSize) * -1;
        });
      }

      function draw(timestamp) {
        if (!lastTick || timestamp - lastTick >= speedIntervalMs) {
          lastTick = timestamp;

          // Fade frame for trailing effect.
          ctx.fillStyle = "rgba(0, 0, 0, 0.09)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.font = fontSize + 'px "Matrix Code NFI", "Lucida Console", Monaco, monospace';
          ctx.fillStyle = color;

          for (let i = 0; i < columns; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            const x = i * fontSize;
            const y = drops[i] * fontSize;

            if (y >= 0 && y <= canvas.height + fontSize) {
              ctx.fillText(text, x, y);
            }

            // Direction fixed to down.
            drops[i] += 1;

            if (y > canvas.height && Math.random() > 0.975) {
              drops[i] = 0;
            }
          }
        }

        window.requestAnimationFrame(draw);
      }

      window.addEventListener("resize", reset);
      reset();
      window.requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
